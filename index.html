<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Producto</title>
    <link rel="stylesheet" href="./src/assets/css/estilos.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <h1>Formulario de Producto</h1>
        <form id="form-producto">
          <div class="form-row">
            <div class="form-col">
              <label class="form-label" for="cod_pro">Código</label>
              <input
                class="form-control"
                type="text"
                name="cod_pro"
                id="cod_pro"
                placeholder="Ingrese Código del Producto" />
            </div>
            <div class="form-col">
              <label class="form-label" for="nombre_pro">Nombre</label>
              <input
                class="form-control"
                type="text"
                name="nombre_pro"
                id="nombre_pro"
                placeholder="Ingrese Nombre del Producto" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label class="form-label" for="bodega">Bodega</label>
              <select class="form-control" name="bodega" id="bodega"></select>
            </div>
            <div class="form-col">
              <label class="form-label" for="sucursal">Sucursal</label>
              <select
                class="form-control"
                name="sucursal"
                id="sucursal"></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-col">
              <label class="form-label" for="moneda">Moneda</label>
              <select class="form-control" name="moneda" id="moneda">
                <option value=""></option>
              </select>
            </div>
            <div class="form-col">
              <label class="form-label" for="precio">Precio</label>
              <input
                class="form-control"
                type="text"
                name="precio"
                id="precio"
                placeholder="Ingrese el Precio, ejemplo: 15000" />
            </div>
          </div>
          <h4>Material del Producto</h4>
          <div class="form-inline-group">
            <div class="form-inline-group__el">
              <input
                type="checkbox"
                id="plastico"
                name="materiales[]"
                value="1" />
              <label for="plastico"> Plástico</label>
            </div>

            <div class="form-inline-group__el">
              <input type="checkbox" id="metal" name="materiales[]" value="2" />
              <label for="metal"> Metal</label>
            </div>

            <div class="form-inline-group__el">
              <input
                type="checkbox"
                id="madera"
                name="materiales[]"
                value="3" />
              <label for="madera"> Madera</label>
            </div>

            <div class="form-inline-group__el">
              <input
                type="checkbox"
                id="vidrio"
                name="materiales[]"
                value="4" />
              <label for="vidrio"> Vidrio</label>
            </div>

            <div class="form-inline-group__el">
              <input
                type="checkbox"
                id="textil"
                name="materiales[]"
                value="5" />
              <label for="textil"> Textil</label>
            </div>
          </div>
          <div>
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea
              class="form-control"
              name="descripcion"
              id="descripcion"></textarea>
          </div>
          <button class="btn-submit" id="guardar" type="submit">
            Guardar Producto
          </button>
        </form>
      </div>
    </div>
    <script src="./src/assets/js/validaciones.js"></script>
    <script src="./src/assets/js/app.js"></script>
  </body>
</html>
